            <script>






                function addTerminalLine(command, response, status, color = "#00ff00") {

                    let terminal = document.getElementById("terminal");

                    let now = new Date();
                    let time = now.toLocaleTimeString('fr-FR');

                    terminal.innerHTML = `
<div style="font-family:monospace; line-height:1.2; margin:0; padding:5px;">

<div><b>Cmd:</b> ${command} <span style="float:right;">${time}</span></div>

<div><b>Rep:</b> ${response}</div>

<div><b>Stat:</b> ${status}</div>

<hr style="border:0;border-top:1px solid #333;margin:4px 0;">

</div>
`;

                }

                async function toggleCamera(el) {
                    if (el.checked) {
                        const ok = await cameraOn();
                        if (!ok) el.checked = false; // rollback si erreur
                    } else {
                        const ok = await camOff();
                        if (!ok) el.checked = true; // rollback si erreur
                    }

                    updateCameraColor();
                }

                // test 3

                function addHistoryLog(type, message) {

                    let container = document.getElementById("logsContainer");

                    let now = new Date();
                    let time = now.toLocaleTimeString('fr-FR');

                    let badgeColor = "#1e90ff";

                    if (type === "CMD")
                        badgeColor = "#7b5cff";

                    if (type === "WARN")
                        badgeColor = "#f1c40f";

                    if (type === "ERROR")
                        badgeColor = "red";

                    container.innerHTML += `
        <div style="display:flex;align-items:center;margin-bottom:6px;">

            <span style="width:80px;color:#b0b0b0;font-size:12px;">
                ${time}
            </span>

            <span style="
                background:${badgeColor};
                color:white;
                padding:2px 6px;
                border-radius:3px;
                font-size:10px;
                margin-right:8px;
            ">
                ${type}
            </span>

            <span style="color:#cfd8dc;">
                ${message}
            </span>

        </div>
    `;

                    container.scrollTop = container.scrollHeight;
                }


                async function cameraOn() {
                    try {
                        const response = await fetch('/cam_on');
                        const data = await response.json();

                        if (data.message === "CAM ON OK") {
                            addTerminalLine(
                                "CAM ON",
                                "Reçu SUCCESS",
                                "CAMERA ACTIVE SUCCESS"
                            );
                            return true;
                        } else {
                            addTerminalLine(
                                "CAM ON",
                                "Erreur ESP32",
                                "FAIL"
                            );
                            return false;
                        }

                    } catch (error) {
                        addTerminalLine(
                            "CAM ON",
                            "Erreur réseau",
                            "FAIL"
                        );
                        return false;
                    }
                }
                async function camOff() {

                    try {

                        addHistoryLog("CMD", "Commande envoyée : CAMERA_OFF");

                        const response = await fetch('/cam_off');
                        const data = await response.json();

                        // terminal détaillé
                        addTerminalLine(
                            "CAM OFF",
                            "Reçu SUCCESS",
                            "CAMERA INACTIVE SUCCESS"
                        );

                        // historique
                        addHistoryLog(
                            "INFO",
                            "Réponse reçue : CAMERA_OFF - SUCCESS"
                        );

                        return true;

                    } catch (error) {

                        addTerminalLine(
                            "CAM OFF",
                            "Erreur communication",
                            "FAIL"
                        );

                        addHistoryLog(
                            "ERROR",
                            "CAMERA_OFF - FAIL"
                        );

                        return false;
                    }
                }
                async function updatePosition() {

                    try {

                        const response = await fetch("/position");
                        const data = await response.json();

                        document.getElementById("latitude").textContent =
                            data.latitude;

                        document.getElementById("longitude").textContent =
                            data.longitude;

                    } catch (error) {
                        console.log(error);
                    }
                }

                setInterval(updatePosition, 2000);
                updatePosition();
